name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows-installer:
    name: Build HRResumeRegistryAssistantSetup.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist\build_logs | Out-Null
          try {
            .\packaging\build_windows.ps1 -UseCurrentPython *>&1 | Tee-Object .\dist\build_logs\windows-build.log
          }
          catch {
            $_ | Out-File -FilePath .\dist\build_logs\windows-build.log -Append
            throw
          }

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-build-log
          path: dist/build_logs/windows-build.log
          if-no-files-found: warn

      - name: Publish build diagnostics summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path ".\dist\build_logs\windows-build.log") {
            "## Windows build log" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            '```text' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            Get-Content ".\dist\build_logs\windows-build.log" -Tail 120 | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            '```' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }

      - name: Verify artifacts
        shell: pwsh
        run: |
          if (-not (Test-Path ".\dist\HRResumeRegistryAssistant.exe")) {
            throw "Standalone EXE was not created"
          }
          if (-not (Test-Path ".\dist\installer\HRResumeRegistryAssistantSetup.exe")) {
            throw "Installer EXE was not created"
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: HRResumeRegistryAssistant-Windows
          path: |
            dist/HRResumeRegistryAssistant.exe
            dist/installer/HRResumeRegistryAssistantSetup.exe
            packaging/INSTALL_INSTRUCTIONS.txt
          if-no-files-found: error
