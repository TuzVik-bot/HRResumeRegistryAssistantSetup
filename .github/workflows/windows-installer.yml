name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows-installer:
    name: Build HRResumeRegistryAssistantSetup.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: .\packaging\build_windows.ps1 -UseCurrentPython

      - name: Verify artifacts
        shell: pwsh
        run: |
          if (-not (Test-Path ".\dist\HRResumeRegistryAssistant.exe")) {
            throw "Standalone EXE was not created"
          }
          if (-not (Test-Path ".\dist\installer\HRResumeRegistryAssistantSetup.exe")) {
            throw "Installer EXE was not created"
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: HRResumeRegistryAssistant-Windows
          path: |
            dist/HRResumeRegistryAssistant.exe
            dist/installer/HRResumeRegistryAssistantSetup.exe
            packaging/INSTALL_INSTRUCTIONS.txt
          if-no-files-found: error
